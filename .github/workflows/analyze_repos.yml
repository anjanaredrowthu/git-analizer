name: Analyze GitHub repositories

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run repository analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_ORG: ${{ vars.GITHUB_ORG || github.repository_owner }}
          OUTPUT_FILE: reports/repositories.json
        run: |
          python scripts/analyze_repos.py --org "$GITHUB_ORG" --output "$OUTPUT_FILE"

      - name: Commit JSON report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- reports/repositories.json; then
            git add reports/repositories.json
            git commit -m "Update repository analysis report"
            git push
          else
            echo "No changes detected in report."
          fi
